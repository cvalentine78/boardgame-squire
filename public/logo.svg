<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Indigo rounded square background -->
  <rect width="512" height="512" rx="96" fill="#4F46E5"/>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Die (white rounded square, offset slightly right to give crown room top-left) -->
  <rect x="158" y="148" width="298" height="298" rx="54" fill="white" filter="url(#shadow)"/>

  <!-- 5-face dots (indigo) -->
  <!-- Top-left -->
  <circle cx="232" cy="220" r="22" fill="#4338CA"/>
  <!-- Top-right -->
  <circle cx="382" cy="220" r="22" fill="#4338CA"/>
  <!-- Center -->
  <circle cx="307" cy="297" r="22" fill="#4338CA"/>
  <!-- Bottom-left -->
  <circle cx="232" cy="374" r="22" fill="#4338CA"/>
  <!-- Bottom-right -->
  <circle cx="382" cy="374" r="22" fill="#4338CA"/>

  <!-- Crown (gold) — top-left corner of the die -->
  <!-- Crown band (darker, behind points) -->
  <rect x="56" y="152" width="152" height="26" rx="6" fill="#D97706"/>
  <!-- Crown points -->
  <path d="M 56,174 L 56,82 L 90,112 L 132,42 L 174,112 L 208,82 L 208,174 Z" fill="#FBBF24"/>
  <!-- Crown band overlay -->
  <rect x="56" y="152" width="152" height="26" rx="6" fill="#F59E0B"/>
  <!-- Small jewel on crown center point -->
  <circle cx="132" cy="52" r="10" fill="#EF4444"/>
</svg>
